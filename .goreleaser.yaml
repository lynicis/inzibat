version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./...
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - arm64
      - amd64
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

nfpms:
  - id: packages
    package_name: inzibat
    vendor: Emre Sırmalı
    homepage: https://github.com/lynicis/inzibat
    maintainer: Emre Sırmalı <me@lynicis.dev>
    description: "A lightweight HTTP mock server for microservices testing and development"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

scoops:
  - name: inzibat
    repository:
      owner: lynicis
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_msg_template: "Scoop manifest update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/lynicis/inzibat"
    description: "A lightweight HTTP mock server for microservices testing and development"
    license: MIT
    persist:
      - inzibat.json

