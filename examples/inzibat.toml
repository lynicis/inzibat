serverPort = 8080
concurrency = 5

[circuitBreaker]
enabled = true
failureThreshold = 5
minimumRequests = 10
openTimeoutMs = 30000
halfOpenMaxRequests = 2
successThreshold = 2

[[routes]]
method = "GET"
path = "/route-one"

[routes.requestTo]
method = "POST"
host = "http://localhost:8081"
path = "/route-one"
passWithRequestHeaders = true
passWithRequestBody = true

[routes.requestTo.headers]
xTestHeader = "TestHeaderValue"

[routes.requestTo.body]
testKey = "testValue"

[routes.requestTo.circuitBreaker]
enabled = true
failureThreshold = 3

[[routes]]
method = "GET"
path = "/route-two"

[routes.requestTo]
host = "http://localhost:8081"
path = "/route-two"
method = "GET"
passWithRequestBody = true
passWithRequestHeaders = true

[routes.requestTo.headers]
xTestHeader = "TestHeaderValue"
