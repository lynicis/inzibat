serverPort: 8080
concurrency: 5

circuitBreaker:
  enabled: true
  failureThreshold: 5
  minimumRequests: 10
  openTimeoutMs: 30000
  halfOpenMaxRequests: 2
  successThreshold: 2

routes:
  - method: GET
    path: /route-one
    requestTo:
      method: POST
      host: http://localhost:8081
      path: /route-one
      headers:
        xTestHeader:
          - TestHeaderValue
      body:
        testKey: testValue
      passWithRequestHeaders: true
      passWithRequestBody: true
      circuitBreaker:
        enabled: true
        failureThreshold: 3

  - method: GET
    path: /route-two
    requestTo:
      method: GET
      host: http://localhost:8081
      path: /route-two
      headers:
        xTestHeader:
          - TestHeaderValue
      passWithRequestHeaders: true
      passWithRequestBody: true
